<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Orion capsule silhouette - side profile -->
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8e8e8"/>
      <stop offset="50%" stop-color="#c0c0c0"/>
      <stop offset="100%" stop-color="#909090"/>
    </linearGradient>
    <linearGradient id="heatshieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B4513"/>
      <stop offset="100%" stop-color="#5C2D06"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ffaa" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#00ffaa" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00ffaa" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Outer glow -->
  <circle cx="64" cy="64" r="62" fill="url(#glow)"/>
  <!-- Capsule body (conical) -->
  <path d="M 44,88 L 56,32 L 64,24 L 72,32 L 84,88 Z" fill="url(#bodyGrad)" stroke="#666" stroke-width="1"/>
  <!-- Heat shield (bottom) -->
  <ellipse cx="64" cy="90" rx="22" ry="5" fill="url(#heatshieldGrad)" stroke="#444" stroke-width="0.5"/>
  <!-- Window band -->
  <rect x="56" y="44" width="16" height="6" rx="2" fill="#1a3a5c" stroke="#446688" stroke-width="0.5"/>
  <!-- Windows -->
  <circle cx="60" cy="47" r="1.5" fill="#4488bb"/>
  <circle cx="68" cy="47" r="1.5" fill="#4488bb"/>
  <!-- NASA stripe -->
  <rect x="50" y="56" width="28" height="2" fill="#cc0000" opacity="0.7"/>
  <!-- Solar panel (left) -->
  <rect x="16" y="50" width="24" height="8" rx="1" fill="#1a237e" stroke="#3949ab" stroke-width="0.5" transform="rotate(-10, 28, 54)"/>
  <line x1="20" y1="50" x2="20" y2="58" stroke="#3949ab" stroke-width="0.3" transform="rotate(-10, 28, 54)"/>
  <line x1="24" y1="50" x2="24" y2="58" stroke="#3949ab" stroke-width="0.3" transform="rotate(-10, 28, 54)"/>
  <line x1="28" y1="50" x2="28" y2="58" stroke="#3949ab" stroke-width="0.3" transform="rotate(-10, 28, 54)"/>
  <line x1="32" y1="50" x2="32" y2="58" stroke="#3949ab" stroke-width="0.3" transform="rotate(-10, 28, 54)"/>
  <line x1="36" y1="50" x2="36" y2="58" stroke="#3949ab" stroke-width="0.3" transform="rotate(-10, 28, 54)"/>
  <!-- Solar panel (right) -->
  <rect x="88" y="50" width="24" height="8" rx="1" fill="#1a237e" stroke="#3949ab" stroke-width="0.5" transform="rotate(10, 100, 54)"/>
  <line x1="92" y1="50" x2="92" y2="58" stroke="#3949ab" stroke-width="0.3" transform="rotate(10, 100, 54)"/>
  <line x1="96" y1="50" x2="96" y2="58" stroke="#3949ab" stroke-width="0.3" transform="rotate(10, 100, 54)"/>
  <line x1="100" y1="50" x2="100" y2="58" stroke="#3949ab" stroke-width="0.3" transform="rotate(10, 100, 54)"/>
  <line x1="104" y1="50" x2="104" y2="58" stroke="#3949ab" stroke-width="0.3" transform="rotate(10, 100, 54)"/>
  <line x1="108" y1="50" x2="108" y2="58" stroke="#3949ab" stroke-width="0.3" transform="rotate(10, 100, 54)"/>
  <!-- Service module (below capsule) -->
  <rect x="48" y="90" width="32" height="12" rx="1" fill="#a0a0a0" stroke="#666" stroke-width="0.5"/>
  <rect x="50" y="92" width="28" height="2" fill="#888"/>
  <rect x="50" y="96" width="28" height="2" fill="#888"/>
</svg>
